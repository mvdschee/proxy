name: release

on:
   push:
      tags:
         - "v*.*.*"
   workflow_dispatch:

env:
   REGISTRY: ghcr.io
   IMAGE_NAME: ${{ github.repository }}

jobs:
   build:
      name: build (${{ matrix.platform }})
      runs-on: ${{ matrix.runner }}
      permissions:
         contents: read
         packages: write
      strategy:
         fail-fast: false
         matrix:
            include:
               - platform: linux/amd64
                 runner: ubuntu-latest
               - platform: linux/arm64
                 runner: ubuntu-24.04-arm

      steps:
         - name: Checkout
           uses: actions/checkout@v4

         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v3

         # dhi.io is gated: the builder pulls dhi.io/alpine-base:*-dev and
         # the runtime stage pulls dhi.io/alpine-base:3.23.
         - name: Login to Docker Hub (for dhi.io)
           uses: docker/login-action@v3
           with:
              registry: dhi.io
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}

         - name: Login to GHCR
           uses: docker/login-action@v3
           with:
              registry: ${{ env.REGISTRY }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: Extract image metadata
           id: meta
           uses: docker/metadata-action@v5
           with:
              images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

         # Build the per-arch image and push it by digest only. The "merge"
         # job below stitches the digests into one multi-arch manifest.
         - name: Build and push by digest
           id: build
           uses: docker/build-push-action@v6
           with:
              context: .
              file: .docker/Dockerfile
              platforms: ${{ matrix.platform }}
              labels: ${{ steps.meta.outputs.labels }}
              cache-from: type=gha,scope=${{ matrix.platform }}
              cache-to: type=gha,scope=${{ matrix.platform }},mode=max
              outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

         - name: Export digest
           run: |
              mkdir -p /tmp/digests
              digest="${{ steps.build.outputs.digest }}"
              touch "/tmp/digests/${digest#sha256:}"

         - name: Upload digest
           uses: actions/upload-artifact@v4
           with:
              name: digest-${{ strategy.job-index }}
              path: /tmp/digests/*
              if-no-files-found: error
              retention-days: 1

   merge:
      name: merge multi-arch manifest
      needs: build
      runs-on: ubuntu-latest
      permissions:
         contents: read
         packages: write

      steps:
         - name: Download digests
           uses: actions/download-artifact@v4
           with:
              path: /tmp/digests
              pattern: digest-*
              merge-multiple: true

         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v3

         - name: Login to GHCR
           uses: docker/login-action@v3
           with:
              registry: ${{ env.REGISTRY }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: Extract image metadata
           id: meta
           uses: docker/metadata-action@v5
           with:
              images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
              tags: |
                 type=semver,pattern={{version}}
                 type=semver,pattern={{major}}.{{minor}}
                 type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

         - name: Create multi-arch manifest
           working-directory: /tmp/digests
           run: |
              docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
                $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

         - name: Inspect image
           run: |
              docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
